<div class="container">
  <div class="header">
    <h1>Mis Tareas</h1>
    <button class="add-btn" type="button" (click)="openAddModal()">
      Agregar tarea <fa-icon [icon]="faPlus"></fa-icon>
    </button>
  </div>

  <div *ngIf="isLoading" class="loading">Cargando tareas...</div>

  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div *ngIf="!isLoading && activities.length === 0" class="empty">
    No hay tareas registradas.
  </div>

  <ul *ngIf="!isLoading && getActivities.length > 0" class="task-list">
    <ng-container *ngFor="let activity of getActivities; let i = index">

      <li
        *ngIf="i > 0 && activity.isCompleted && !getActivities[i - 1].isCompleted"
        class="separator clickable"
        (click)="toggleCompleted()">
        <span><fa-icon [icon]="showCompleted ? faArrowDown : faArrowRight"></fa-icon> Completadas ({{ completedCount }})</span>
      </li>

      <li
        class="task-item"
        [class.completed-item]="activity.isCompleted"
        [class.collapsed-completed]="activity.isCompleted && !showCompleted"
        (click)="openEditModal(activity)">

        <div class="task-info" [class.completed]="activity.isCompleted">
          <span class="task-name">{{ activity.name }}</span>
          <span class="task-desc" *ngIf="activity.description">
            {{ activity.description }}
          </span>
          <span class="task-date">
            {{ activity.createdAt | date:'dd/MM/yyyy' }}
          </span>
        </div>

        <div class="task-actions">
          <span class="badge" [class.done]="activity.isCompleted">
            <fa-icon [icon]="activity.isCompleted ? faCheck : faPending"></fa-icon>
          {{ activity.isCompleted ? 'Completada' : 'Pendiente' }}
        </span>
          <button class="delete-btn" type="button"
                  (click)="openDeleteModal(activity); $event.stopPropagation();"
                  aria-label="Eliminar tarea">
                <fa-icon [icon]="faDelete"></fa-icon>
                </button>
        </div>
      </li>
    </ng-container>
  </ul>
</div>

<app-modal
  [isOpen]="isModalOpen"
  [title]="modalTitle"
  (closed)="closeModal()">

  <ng-container *ngIf="modalMode !== 'delete'">
    <app-activity-form
      #editForm
      [activity]="selectedActivity"
      (saved)="onActivitySaved($event)"
      (cancelled)="closeModal()">
    </app-activity-form>

    <div modal-footer>
      <button class="secondary-btn" type="button" (click)="closeModal()">
        Cancelar
      </button>
      <button class="primary-btn" type="button"
              [disabled]="!editForm.canSave"
              (click)="editForm.save()">
        Guardar
      </button>
    </div>
  </ng-container>

  <ng-container *ngIf="modalMode === 'delete'">
    <app-activity-delete-form
      #deleteForm
      [activity]="selectedActivity"
      (saved)="onActivityDeleted($event)"
      (cancelled)="closeModal()">
    </app-activity-delete-form>

    <div modal-footer>
      <button class="secondary-btn" type="button" (click)="closeModal()">
        Cancelar
      </button>
      <button class="danger-btn" type="button"
              [disabled]="deleteForm.isSaving"
              (click)="deleteForm.save()">
        Eliminar
      </button>
    </div>
  </ng-container>
</app-modal>
